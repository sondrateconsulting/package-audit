# Run the test suite and typecheck on every PR and every push to main.
#
# Before this workflow existed the only CI gate was the zizmor workflow audit (sca.yml),
# so a code regression in any scripts/*.ts module would merge green. This closes that gap.
#
# Bun is pinned to the version the repo is developed and live-tested against (README
# documents ≥ 1.1; bump deliberately, not via "latest"). `--frozen-lockfile` makes the
# install fail loudly on bun.lock drift instead of silently resolving new versions.
name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Same pattern as sca.yml: PRs coalesce by ref (a newer push cancels the superseded
  # run, since only the latest commit gates the merge); main and workflow_dispatch get
  # a per-commit group (the github.sha suffix) so every commit is tested to completion.
  # ('pr' is a truthy constant, avoiding the empty-string falsy pitfall in GitHub's
  # `a && b || c` ternary.)
  group: tests-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: bun test + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
